<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Compteur RunPink</title>
    <style>
        body { background: #fdfdfd; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; text-align: center; }
        .card { padding: 40px 20px; max-width: 400px; }
        .label { font-size: 12px; color: #888; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        #counter { font-size: 5.5rem; font-weight: 900; background: linear-gradient(45deg, #FF4081, #E91E63); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin: 10px 0; font-variant-numeric: tabular-nums; }
        .sub { font-size: 1.2rem; color: #333; font-weight: 600; }
        .btn { margin-top: 40px; display: inline-block; padding: 15px 30px; background: #E91E63; color: white; text-decoration: none; border-radius: 50px; font-weight: bold; box-shadow: 0 4px 15px rgba(233, 30, 99, 0.3); }
    </style>
</head>
<body>
    <div class="card">
        <div class="label">France • Depuis le 1er Janvier 2026</div>
        <div id="counter">0</div>
        <div class="sub">victimes d'harcèlement de rue</div>
        <a href="https://votre-instagram-ici.com" class="btn">REJOINDRE LE MOUVEMENT</a>
    </div>

    <script>
        function update() {
            const start = new Date('2026-01-01T00:00:00').getTime();
            const now = Date.now();
            const elapsed = (now - start) / 1000;
            // Base : 65 000 agressions estimées/an (chiffre noir inclus)
            const count = Math.floor(elapsed * 0.0020611);
            document.getElementById('counter').innerText = count.toLocaleString('fr-FR');
        }
        setInterval(update, 1000); // Mise à jour toutes les secondes
        update();
    </script>
</body>
</html>
